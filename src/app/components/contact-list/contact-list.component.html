<div class="container mt-4">
  <h2>Lista de Contatos</h2>

  <div class="d-flex items-center gap-3 mb-4">
    <input type="text" class="form-control" placeholder="Pesquisar por nome, email ou telefone..."
      [(ngModel)]="searchTerm" (input)="applyFilter()">
    <a routerLink="/add" class="d-inline-flex btn btn-primary">Adicionar</a>
  </div>

  <div *ngIf="loading" class="text-center">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Carregando...</span>
    </div>
  </div>

  <div *ngIf="!loading && filteredContacts.length === 0" class="alert alert-info">
    Nenhum contato encontrado
  </div>

  <div class="list-group">
    <div *ngFor="let contact of filteredContacts" class="list-group-item">
      <div class="d-flex justify-content-between align-items-center">
        <div class="d-flex flex-column gap-1">
          <h3 class="mb-0 fs-4">{{ contact.nome }}</h3>
          <input type="tel" appPhoneMask="cel" readonly class="border-0 fs-6" [(ngModel)]="contact.celular">
          <p class="fs-7">{{ contact.email }}</p>
        </div>

        <div class="d-flex flex-row gap-3">
          <span *ngIf="contact.favorito === 'S'">*FAVORITO*</span>
          <a [routerLink]="['/edit', contact.id]" class="btn btn-sm btn-secondary text-center">Editar</a>
          <button (click)="deleteContact(contact.id)" class="btn btn-sm btn-danger">Excluir</button>
        </div>
      </div>
    </div>
  </div>
</div>
