<div class="container mt-4">
  <h2>Lista de Contatos</h2>

  <div class="d-flex items-center gap-3 mb-4">
    <input 
      type="text" 
      class="form-control" 
      placeholder="Pesquisar por nome, email ou telefone..."
      [(ngModel)]="searchTerm"
      (input)="applyFilter()"
    >
    <a routerLink="/add" class="d-inline-flex btn btn-primary">Adicionar</a>
  </div>

  <div *ngIf="loading" class="text-center">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Carregando...</span>
    </div>
  </div>

  <div *ngIf="!loading && filteredContacts.length === 0" class="alert alert-info">
    Nenhum contato encontrado
  </div>

  <div class="list-group">
    <div *ngFor="let contact of filteredContacts" class="list-group-item">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h5>{{ contact.nome }}</h5>
          <p class="mb-1">{{ contact.celular }}</p>
          <small>{{ contact.email }}</small>
        </div>

        <div class="d-flex flex-row gap-3">
          <span *ngIf="contact.favorito === 'S'">É favorito</span>
          <a [routerLink]="['/edit', contact.id]" class="btn btn-sm btn-secondary mr-2">Editar</a>
          <button (click)="deleteContact(contact.id)" class="btn btn-sm btn-danger">Excluir</button>
        </div>
      </div>
    </div>
  </div>
</div>
